<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BeautyQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(233, 30, 99, 0.15);
            border: none;
        }
        .btn-primary { background: #e91e63; border-color: #e91e63; border-radius: 12px; }
        .btn-primary:hover { background: #c2185b; border-color: #c2185b; }
        .brand { color: #e91e63; font-weight: 800; font-size: 2rem; }
    </style>
</head>
<body>
    
    <div class="card login-card p-4 p-md-5">
        <div class="text-center mb-4">
            
            <div class="brand">BeautyQ</div>
            <p class="text-muted">Salon Booking & Management</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger">Invalid username or password.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign In</button>
        </form>

        <hr class="my-4">
        
        <div class="text-center small">
            <p class="mb-2"><a href="{% url 'register_customer' %}">Create Customer Account</a></p>
            <p class="mb-2"><a href="{% url 'register_owner' %}">Register as Parlour Owner</a></p>
            <p class="mb-0"><a href="{% url 'customer_home' %}">Back to Home</a></p>
        </div>
    </div>
</body>
</html>
