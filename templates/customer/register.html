{% extends 'customer/base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card service-card p-4">
            <h3 class="fw-bold text-center mb-4">Create Customer Account</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="phone" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required minlength="8">
                </div>
                <button type="submit" class="btn btn-beauty w-100">Sign Up</button>
            </form>
            <p class="text-center mt-3 small">Already have an account? <a href="{% url 'login' %}">Login</a></p>
            <p class="text-center small"><a href="{% url 'register_owner' %}">Register as Parlour Owner</a></p>
        </div>
    </div>
</div>
{% endblock %}
