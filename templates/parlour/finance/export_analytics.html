{% extends 'parlour/base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0">
        <div class="card-body p-5 text-center">
            <div class="mb-4">
                <i class="fas fa-file-csv fa-4x text-success"></i>
            </div>
            <h2 class="fw-bold">Export Business Analytics</h2>
            <p class="text-muted">Download your complete transaction, tax, and earnings history for your records.</p>
            
            <div class="alert alert-info d-inline-block">
                <strong>Format:</strong> .CSV (Compatible with Excel, Google Sheets, and Tally)
            </div>

            <div class="mt-4">
                <form action="{% url 'export_analytics' %}" method="get">
                    <div class="row justify-content-center mb-3">
                        <div class="col-md-3">
                            <label class="form-label small">From Date</label>
                            <input type="date" name="start" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small">To Date</label>
                            <input type="date" name="end" class="form-control">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success btn-lg px-5">
                        <i class="fas fa-download me-2"></i> Download CSV Report
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
