{% extends 'parlour/base.html' %}

{% block content %}
<div class="container-fluid p-4">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-header bg-white text-danger">
            <h4 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Confirm Delete</h4>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete the promo code <strong>"{{ object.code }}"</strong>?</p>
            <p class="text-muted small">This action cannot be undone.</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-end mt-4">
                    <a href="{% url 'all_promos' %}" class="btn btn-light">Cancel</a>
                    <button type="submit" class="btn btn-danger">Delete Promo Code</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
