{% extends 'parlour/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white"><h3>{{ title }}</h3></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">{{ field.label }} {{ field.errors }} {{ field }}</div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success">Save</button>
                    <a href="{% url 'payout_periods' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
